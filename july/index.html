<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 July - 런던 기도의 집 소식</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f3ef; /* 따뜻한 느낌의 미백색 바탕 */
            --text-main: #222222;
            --text-light: #555555;
            --gold-accent: #c49a45;
            --footer-bg: #3d3a35; /* 세련되고 따뜻한 웜 다크 그레이 */
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            word-break: keep-all; /* 단어 단위로 줄바꿈 (한글 가독성 향상) */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background-color: transparent;
        }

        .content-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* 1. Header Design (6월 소식지 레이아웃 반영 - 텍스트 하단 정렬) */
        .hero-header {
            position: relative;
            width: 100%;
            height: 65vh;
            min-height: 450px;
            display: flex;
            align-items: flex-end; /* 하단 정렬 */
            justify-content: center;
            overflow: hidden;
            padding-bottom: 70px; /* 하단 여백 */
            box-sizing: border-box;
        }

        .hero-bg {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background-image: url('London.JPG');
            background-size: cover;
            background-position: center;
            filter: blur(8px) brightness(0.65);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--white);
            font-family: 'Nanum Myeongjo', serif;
        }

        .hero-date {
            font-size: 1.15rem;
            color: #d4af37;
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-family: 'Nanum Myeongjo', serif;
            font-weight: 700;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            letter-spacing: -1px;
        }

        .hero-subtitle {
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: #e2e8f0;
            font-weight: 400;
            font-family: 'Pretendard', sans-serif;
        }

        .btn-prev-month {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 3;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            text-decoration: none;
            backdrop-filter: blur(5px);
            transition: background 0.3s;
            font-weight: 500;
        }

        .btn-prev-month:hover {
            background: rgba(255,255,255,0.2);
        }

        /* Typography & Layout inside content */
        .greeting {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 50px;
            text-align: center;
            color: #1a1a1a;
            font-family: 'Nanum Myeongjo', serif;
        }

        h2 {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 1.7rem;
            font-weight: 800;
            color: #111;
            margin-top: 70px;
            margin-bottom: 25px;
            text-align: center;
        }

        h2::after {
            content: '';
            display: block;
            width: 30px;
            height: 2px;
            background-color: var(--gold-accent);
            margin: 15px auto 0;
        }

        p {
            margin-bottom: 24px;
            font-size: 1.08rem;
            color: #333333;
            text-align: justify; /* 데스크탑에서는 양쪽 정렬 유지 */
            line-height: 1.85;
        }

        /* Highlight Text */
        strong.highlight {
            font-weight: 700;
            color: #000;
            box-shadow: inset 0 -12px 0 rgba(212, 175, 55, 0.25);
        }

        /* Image Styles */
        .full-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 30px 0 10px 0;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .img-caption {
            text-align: center;
            font-size: 0.95rem;
            color: #666;
            margin-top: 5px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* 2. [수정됨] 김종철 감독 사진 및 소개글 그룹 스타일 */
        .side-figure {
            float: right;
            width: 280px;
            margin: 5px 0 20px 30px;
            text-align: center; /* PC에서 글씨가 사진 중앙에 정렬되도록 설정 */
        }
        .side-img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: block;
        }
        .side-caption {
            font-size: 0.95rem;
            color: #666;
            margin-top: 8px; /* 사진 바로 밑에 긴밀하게 밀착 */
            margin-bottom: 0;
            font-weight: 500;
            line-height: 1.4;
        }

        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
        }

        .image-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Quote */
        .quote-container {
            text-align: center;
            margin: 60px 0;
            padding: 0 20px;
        }

        .quote-mark {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 3rem;
            color: #d4af37;
            line-height: 0;
            margin-bottom: 20px;
        }

        .quote-text {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #222;
            line-height: 1.7;
            margin-bottom: 15px;
        }

        .quote-ref {
            font-size: 0.95rem;
            color: var(--text-light);
            font-weight: 600;
        }

        /* Action Buttons (수정됨: 시원하고 투명한 볼록 단추 형태) */
        .btn-center {
            text-align: center;
            margin: 40px 0;
        }

        .btn-action {
            display: inline-block;
            padding: 14px 40px;
            color: #ffffff;
            text-decoration: none;
            border-radius: 30px; /* 둥근 단추 형태 */
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 1px;
            
            /* 시원한 색상 및 반투명 유리 효과 */
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.7), rgba(59, 130, 246, 0.8));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            
            /* 볼록한 입체감을 주는 테두리와 안쪽 그림자 */
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 
                0 8px 20px rgba(59, 130, 246, 0.2),         /* 바깥 부드러운 그림자 */
                inset 0 3px 5px rgba(255, 255, 255, 0.6),   /* 위쪽 하이라이트 (볼록한 느낌) */
                inset 0 -3px 5px rgba(0, 0, 0, 0.1);        /* 아래쪽 음영 */
                
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);    /* 글씨 가독성 향상 */
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            transform: translateY(-3px); /* 마우스 오버 시 살짝 떠오르는 효과 */
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.85), rgba(59, 130, 246, 0.95));
            box-shadow: 
                0 12px 25px rgba(59, 130, 246, 0.35),
                inset 0 3px 5px rgba(255, 255, 255, 0.7),
                inset 0 -3px 5px rgba(0, 0, 0, 0.15);
        }

        /* 4. 연합 예배/집회 섹션 (수정됨: 불필요한 텍스트 삭제 및 카드 강조) */
        .worship-section {
            position: relative;
            padding: 90px 20px;
            background-image: url('cftn4.JPG');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .worship-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65); /* 배경을 조금 더 어둡게 하여 카드 강조 */
        }

        .worship-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
        }

        .cards-grid {
            display: flex;
            justify-content: center;
        }

        .glass-card {
            width: 100%;
            max-width: 420px; /* 크기 약간 확대 */
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.4); /* 테두리 강조 */
            border-radius: 16px; /* 둥글기 증가 */
            padding: 50px 30px; /* 패딩 증가 */
            text-align: center;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); /* 그림자 강조 */
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .card-date {
            color: #a7f3d0;
            font-size: 1.1rem; /* 폰트 크기 확대 */
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .card-title {
            font-family: 'Nanum Myeongjo', serif;
            font-size: 2rem; /* 폰트 크기 확대 */
            font-weight: 800;
            margin-bottom: 25px;
            line-height: 1.4;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.3);
        }

        .card-desc {
            font-size: 1.1rem; /* 폰트 크기 확대 */
            color: #f1f5f9;
            line-height: 1.7;
            margin-bottom: 40px;
            flex-grow: 1;
        }

        .btn-poster {
            display: inline-block;
            padding: 14px 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.3);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.6);
            cursor: pointer;
        }

        .btn-poster:hover {
            background: rgba(255, 255, 255, 0.5);
            color: #000;
        }

        /* 이미지 모달 (포스터 보기 팝업) 스타일 */
        .modal-overlay {
            display: none; /* 기본적으로 숨김 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            position: relative;
            max-width: 90%;
            max-height: 90vh;
        }

        .modal-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            object-fit: contain;
        }

        .modal-close {
            position: absolute;
